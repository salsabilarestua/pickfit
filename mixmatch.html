<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Mix & Match - PickFit</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .mix-container {
            display: flex;
            gap: 20px;
            padding: 100px 5%;
        }

        .lemari-list {
            width: 30%;
            background: #f7f3f0;
            padding: 20px;
            border-radius: 10px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .item {
            margin-bottom: 15px;
            cursor: grab;
        }

        .item img {
            width: 100%;
            border-radius: 10px;
        }

        .canvas-area {
            width: 70%;
            height: 500px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            position: relative;
            background: #fff;
        }

        .dropped {
            position: absolute;
            width: 120px;
            cursor: move;
            user-select: none;
        }

        .control-box {
            position: absolute;
            border: 1px dashed #999;
        }

        .resize-handle {
            width: 10px;
            height: 10px;
            background: #c97c5d;
            position: absolute;
            right: -5px;
            bottom: -5px;
            cursor: se-resize;
        }

        .rotate-handle {
            width: 10px;
            height: 10px;
            background: black;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            cursor: grab;
            border-radius: 50%;
        }

    </style>
</head>
<body>

<div class="mix-container">

    <div class="lemari-list" id="lemari-list">
        <h3>Ambil dari Lemari</h3>
    </div>

    <div class="canvas-area" id="canvas">
        <p style="text-align:center; margin-top:200px; color:#aaa;">
            Drag baju ke sini 👕
        </p>
    </div>

</div>

<nav id="navbar">
    <a href="index.html" class="logo">Pick<span>Fit</span></a>
    
    <div class="nav-container" id="nav-container">
        <ul class="nav-links">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="lemari.html">Lemari</a></li>
            <li><a href="mixmatch.html" class="active">Mix & Match</a></li>
            <li><a href="#">Planner</a></li>
        </ul>

        <div class="auth-buttons">
            <a href="masuk.html" class="btn-link">Masuk</a>
            <a href="daftar.html" class="btn-black">DAFTAR</a>
        </div>
    </div>

    <button class="menu-toggle" id="mobile-menu">☰</button>
</nav>



<script src="mixmatch.js"></script>
</body>
</html>
