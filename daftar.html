<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - PickFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper"> <div class="auth-card"> <h2 class="serif">Daftar PickFit</h2>
            <form id="form-registrasi">
                <input type="text" placeholder="Nama Lengkap" required>
                <input type="email" placeholder="Email" required>
                <input type="password" id="pass-daftar" placeholder="Password" required>
                <button type="submit" class="btn-signin">DAFTAR SEKARANG</button>

                <p style="margin-top:20px; font-size:0.8rem;">Sudah punya akun? <a href="masuk.html" style="color:var(--orange-accent); font-weight:600; text-decoration:none;">Masuk Disini</a></p>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
