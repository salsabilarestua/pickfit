<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - PickFit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <a href="index.html" class="btn-home">&larr; Home</a>
            
            <h2 class="serif">Masuk <span style="color:var(--orange-accent)">PickFit</span></h2>
            
            <p class="auth-subtitle">Welcome Back</p>
            
            <form id="form-login">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-signin" style="width:100%; border:none; cursor:pointer;">Masuk</button>
            </form>
            
            <p style="margin-top:20px; font-size:0.8rem;">Belum punya akun? <a href="daftar.html" style="color:var(--orange-accent); font-weight:600; text-decoration:none;">Daftar Yuk</a></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
